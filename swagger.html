<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio API Documentation</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --accent: #f093fb;
      --success: #49cc90;
      --warning: #fca130;
      --error: #f93e3e;
      --bg-dark: #0a0e27;
      --bg-card: #0f172a;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: rgba(102, 126, 234, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #0f1937 100%);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, var(--accent) 100%);
      padding: 40px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 10px 40px rgba(102, 126, 234, 0.15);
    }

    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 28px;
      font-weight: 700;
      color: white;
    }

    .header-title i {
      font-size: 32px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    /* Main Content */
    .content {
      padding: 40px 20px;
    }

    .intro-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
    }

    .intro-section h2 {
      margin-bottom: 16px;
      color: var(--text-primary);
      font-size: 22px;
    }

    .intro-section p {
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* Endpoint Grid */
    .endpoints-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .endpoint-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .endpoint-card:hover {
      border-color: var(--primary);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.2);
      transform: translateY(-4px);
    }

    .endpoint-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .method-badge {
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 12px;
      min-width: 50px;
      text-align: center;
      text-transform: uppercase;
    }

    .method-badge.get {
      background: rgba(97, 175, 254, 0.2);
      color: #61affe;
    }

    .method-badge.post {
      background: rgba(73, 204, 144, 0.2);
      color: var(--success);
    }

    .endpoint-path {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      color: var(--text-secondary);
      word-break: break-all;
      flex: 1;
    }

    .endpoint-content {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .endpoint-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .endpoint-description {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      flex: 1;
    }

    .endpoint-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      background: rgba(102, 126, 234, 0.15);
      color: var(--primary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .try-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .try-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    /* Tester Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 28px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: rgba(102, 126, 234, 0.15);
    }

    .modal-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      background: rgba(15, 23, 42, 0.8);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      outline: none;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    .test-btn {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
    }

    .test-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .test-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .response-box {
      margin-top: 20px;
      padding: 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .response-box.success {
      border-color: rgba(73, 204, 144, 0.3);
      background: rgba(73, 204, 144, 0.05);
      color: var(--success);
    }

    .response-box.error {
      border-color: rgba(249, 62, 62, 0.3);
      background: rgba(249, 62, 62, 0.05);
      color: var(--error);
    }

    .status-code {
      font-weight: 700;
      margin-bottom: 8px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      margin-top: 60px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header .container {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .header-title {
        font-size: 24px;
      }

      .endpoints-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
        padding: 24px;
      }
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(102, 126, 234, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-title">
        <i class="fas fa-code"></i>
        Portfolio API
      </div>
      <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
    </div>
  </header>

  <main class="content">
    <div class="container">
      <div class="intro-section">
        <h2>API Documentation</h2>
        <p>Click "Try it out" on any endpoint to test the API directly from your browser.</p>
      </div>

      <div class="endpoints-grid" id="endpoints"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 Meet Sinojia Portfolio API • Real-time API documentation</p>
  </footer>

  <!-- Tester Modal -->
  <div class="modal" id="testerModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <form id="testerForm" onsubmit="testEndpoint(event)">
        <div id="formFields"></div>
        <button type="submit" class="test-btn" id="testBtn">
          <i class="fas fa-play"></i> Send Request
        </button>
      </form>
      <div id="responseContainer" style="display:none;">
        <h3 style="margin-top: 24px; margin-bottom: 12px;">Response</h3>
        <div id="responseBox" class="response-box"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@3/swagger-ui-standalone-preset.js"></script>
  <script>
    const endpoints = [
      {
        method: 'GET',
        path: '/api/whoami',
        title: 'Get Profile',
        description: 'Retrieve basic profile information including name, title, and social links.',
        tag: 'Profile',
        fields: [],
        example: { name: 'Meet Sinojia', title: 'Software Engineer — Mobile & Web', company: 'UBS', location: 'Pune, Maharashtra, India' }
      },
      {
        method: 'GET',
        path: '/api/projects',
        title: 'List Projects',
        description: 'Get all featured projects with descriptions and tech stack.',
        tag: 'Projects',
        fields: [],
        example: { projects: [{ name: 'Mr. Mechanic', tech: ['Flutter', 'Golang', 'Gin', 'MySQL', 'AWS'], description: 'Built a full-stack vendor management system supporting billing and inventory operations. Designed and implemented REST APIs using Golang (Gin) with JWT authentication and OTP verification via MSG91. Deployed backend services on Render with AWS RDS and S3 for scalable data and image storage. Published the mobile application on Google Play Store, handling production builds, releases, and updates.' }, { name: 'EchoShop', tech: ['React.js', 'Node.js', 'Firebase', 'Stripe'], description: 'Developed a full-stack e-commerce platform with secure Stripe-based payment integration. Optimized delivery routing using Dijkstra\'s algorithm with real-time location data integration.' }] }
      },
      {
        method: 'GET',
        path: '/api/skills',
        title: 'Get Skills',
        description: 'View all skills organized by category.',
        tag: 'Skills',
        fields: [],
        example: { skills: { languages: ['C++', 'Python', 'Golang', 'Java', 'JavaScript', 'Dart'], frameworks: ['Gin', 'Node.js', '.NET', 'Flutter', 'Spring Boot', 'React', 'Angular'], tools: ['SQL', 'Git', 'Unix', 'DSA', 'OOP', 'OS', 'DBMS'] } }
      },
      {
        method: 'GET',
        path: '/api/experience',
        title: 'Get Experience',
        description: 'View work history and career timeline.',
        tag: 'Experience',
        fields: [],
        example: { experience: [{ company: 'UBS', role: 'Software Engineer', start: 'Feb 2024', end: 'Current', location: 'Pune, India' }, { company: 'Samsung R&D India', role: 'Prism Developer', start: 'Dec 2022', end: 'Aug 2023' }] }
      },
      {
        method: 'GET',
        path: '/api/achievements',
        title: 'Get Achievements',
        description: 'View awards, certifications, and achievements.',
        tag: 'Achievements',
        fields: [],
        example: { achievements: [{ title: 'Knight on LeetCode', detail: 'Top 5%, highest rating 1930+' }, { title: 'CodeChef 3 coder', detail: 'Top 10%, highest rating 1606' }, { title: 'Codeforces Pupil', detail: 'Highest rating 1284' }, { title: 'Runner-up Binance Ideathon 2022', detail: 'Blockchain for Good' }] }
      },
      {
        method: 'GET',
        path: '/api/metrics',
        title: 'Get Metrics',
        description: 'Get career statistics and aggregate metrics.',
        tag: 'Metrics',
        fields: [],
        example: { dsa_problems_solved: 1003, projects_completed: 15, contributions_total: 342, code_reviews: 87, leetcode_rating: 1930, codechef_rating: 1606, codeforces_rating: 1284, uptime_maintained: 99.8, performance_improvement: 87, deployment_success_rate: 98.5, team_satisfaction: 4.9 }
      }
    ];

    let currentEndpoint = null;

    function renderEndpoints() {
      const container = document.getElementById('endpoints');
      container.innerHTML = endpoints.map((ep, i) => `
        <div class="endpoint-card" onclick="openTester(${i})">
          <div class="endpoint-header">
            <span class="method-badge ${ep.method.toLowerCase()}">${ep.method}</span>
            <code class="endpoint-path">${ep.path}</code>
          </div>
          <div class="endpoint-content">
            <div class="endpoint-title">${ep.title}</div>
            <div class="endpoint-description">${ep.description}</div>
            <div class="endpoint-tags">
              <span class="tag">${ep.tag}</span>
            </div>
            <button class="try-btn" onclick="event.stopPropagation(); openTester(${i})">
              <i class="fas fa-flask"></i> Try it out
            </button>
          </div>
        </div>
      `).join('');
    }

    function openTester(index) {
      currentEndpoint = endpoints[index];
      const ep = currentEndpoint;
      
      document.getElementById('modalTitle').textContent = ep.title;
      document.getElementById('modalSubtitle').textContent = `${ep.method} ${ep.path}`;
      
      const formFields = document.getElementById('formFields');
      if (ep.fields.length > 0) {
        formFields.innerHTML = ep.fields.map(f => {
          if (f.type === 'textarea') {
            return `
              <div class="form-group">
                <label>${f.label}${f.required ? '*' : ''}</label>
                <textarea name="${f.name}" ${f.required ? 'required' : ''} placeholder="Enter ${f.label}"></textarea>
              </div>
            `;
          }
          return `
            <div class="form-group">
              <label>${f.label}${f.required ? '*' : ''}</label>
              <input type="${f.type}" name="${f.name}" ${f.required ? 'required' : ''} placeholder="Enter ${f.label}">
            </div>
          `;
        }).join('');
      } else {
        formFields.innerHTML = '<p style="color: var(--text-secondary); font-size: 14px;">No parameters required. Click "Send Request" to test.</p>';
      }
      
      document.getElementById('responseContainer').style.display = 'none';
      document.getElementById('testerForm').reset();
      document.getElementById('testerModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('testerModal').classList.remove('active');
      currentEndpoint = null;
    }

    async function testEndpoint(event) {
      event.preventDefault();
      const ep = currentEndpoint;
      const btn = document.getElementById('testBtn');
      const responseBox = document.getElementById('responseBox');
      const responseContainer = document.getElementById('responseContainer');
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Sending...';
      
      try {
        const formData = new FormData(document.getElementById('testerForm'));
        const body = {};
        for (let [key, value] of formData.entries()) {
          body[key] = value;
        }
        
        const options = {
          method: ep.method,
          headers: { 'Content-Type': 'application/json' }
        };
        
        if (ep.method === 'POST') {
          options.body = JSON.stringify(body);
        }
        
        const response = await fetch(ep.path, options);
        const data = await response.json();
        
        responseBox.className = 'response-box ' + (response.ok ? 'success' : 'error');
        responseBox.innerHTML = `<div class="status-code">${response.status} ${response.statusText}</div>${JSON.stringify(data, null, 2)}`;
        responseContainer.style.display = 'block';
      } catch (error) {
        responseBox.className = 'response-box error';
        responseBox.innerHTML = `<div class="status-code">Error</div>${error.message}`;
        responseContainer.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-play"></i> Send Request';
      }
    }

    document.getElementById('testerModal').addEventListener('click', (e) => {
      if (e.target.id === 'testerModal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    renderEndpoints();

    // Register Service Worker for API mocking
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.error('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
